# Configuration file
site_name: CultivaLab Documentation
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]

nav:
  - Inicio: index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences